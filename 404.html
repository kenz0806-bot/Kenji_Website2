<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>ページが見つかりません | 佐藤健司 公認会計士事務所</title>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #04070f;
            color: #f4f7fc;
            font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
            font-weight: 300;
            text-align: center;
        }
        .box { padding: 24px; }
        h1 { font-size: 15px; letter-spacing: 0.42em; text-indent: 0.42em; color: #8fb4e8; font-weight: 400; margin: 0 0 18px; text-transform: uppercase; }
        p.code { font-size: 56px; margin: 0 0 10px; letter-spacing: 0.04em; }
        p.msg { font-size: 15px; line-height: 2; color: #c9d6ea; margin: 0 0 34px; }
        a.btn {
            display: inline-block;
            padding: 12px 34px;
            border: 1px solid #4d9fff;
            color: #f4f7fc;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 0.18em;
            text-indent: 0.18em;
            transition: background 0.3s;
        }
        a.btn:hover { background: rgba(77,159,255,0.18); }
    </style>
</head>
<body>
    <div class="box">
        <h1>Not Found</h1>
        <p class="code">404</p>
        <p class="msg">お探しのページは見つかりませんでした。<br>移動または削除された可能性があります。</p>
        <a class="btn" href="/">トップページへ戻る</a>
    </div>
</body>
</html>
